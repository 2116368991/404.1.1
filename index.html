    <!-- 自定义密码弹窗（核心：替代prompt，解决键盘拦截） -->
    <div class="password-modal" id="passwordModal">
      <div class="modal-content">
        <div class="modal-title">💖 请输入专属解锁密码</div>
        <input type="password" class="password-input" id="passwordInput" placeholder="输入密码后点击确认">
        <div class="modal-buttons">
          <button class="modal-btn confirm-btn" id="confirmBtn">确认</button>
          <button class="modal-btn cancel-btn" id="cancelBtn">取消</button>
        </div>
      </div>
    </div>

    <script>
      // 1. 全局变量定义
      const CORRECT_PASSWORD = "1314"; // 自定义密码
      let targetUrl = ""; // 要跳转的目标地址
      let newWindow = null; // 预打开的空白窗口

      // 2. 获取元素
      const passwordModal = document.getElementById('passwordModal');
      const passwordInput = document.getElementById('passwordInput');
      const confirmBtn = document.getElementById('confirmBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const protectedLinks = document.querySelectorAll('.protected-link');

      // 3. 绑定链接点击事件（无拦截+无键盘冲突）
      protectedLinks.forEach(link => {
        link.addEventListener('click', function() {
          // 步骤1：保存目标地址
          targetUrl = this.getAttribute('data-url');
          
          // 步骤2：点击瞬间打开空白窗口（避免跳转被拦截）
          newWindow = window.open('', '_blank');
          newWindow.document.write('<div style="text-align:center;margin-top:50px;font-size:20px;color:#4f0088;">💖 正在验证密码...</div>');
          
          // 步骤3：显示自定义密码弹窗（无键盘拦截）
          passwordModal.classList.add('show');
          passwordInput.focus(); // 自动聚焦输入框，键盘直接弹出
        });
      });

      // 4. 确认密码按钮事件
      confirmBtn.addEventListener('click', function() {
        const userInput = passwordInput.value.trim();
        
        if (userInput === CORRECT_PASSWORD) {
          alert("密码正确✨ 正在为你打开专属回忆～");
          // 验证通过：跳转预打开的空白窗口
          setTimeout(() => {
            newWindow.location.href = targetUrl;
          }, 1000);
        } else {
          alert("密码不对哦😜 再想想我们的专属密码～");
          // 密码错误：关闭空白窗口
          newWindow.close();
        }
        
        // 关闭弹窗+清空输入
        passwordModal.classList.remove('show');
        passwordInput.value = "";
      });

      // 5. 取消按钮事件
      cancelBtn.addEventListener('click', function() {
        alert("你取消了输入，暂时无法查看哦～");
        // 取消：关闭空白窗口+弹窗
        newWindow.close();
        passwordModal.classList.remove('show');
        passwordInput.value = "";
      });

      // 6. 支持回车确认密码（优化体验）
      passwordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          confirmBtn.click();
        }
      });
    </script>
